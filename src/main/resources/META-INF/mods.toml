modLoader="javafml"
loaderVersion="${loader_version_range}"

license="${mod_license}"
issueTrackerURL="${mod_issues}"
clientSideOnly=true

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${mod_homepage}"
logoFile="logo.png"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''

# Forge
[[dependencies.${mod_id}]] 
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

# Minecraft
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Immersive Engineering
[[dependencies.${mod_id}]]
    modId="immersiveengineering"
    mandatory=true
    versionRange="[${immersive_engineering_version},)"
    ordering="BEFORE"
    side="BOTH"

# Immersive Petroleum
[[dependencies.${mod_id}]]
    modId="immersivepetroleum"
    mandatory=false
    versionRange="[${immersive_petroleum_version},)"
    ordering="BEFORE"
    side="CLIENT"

